name: Deploy Financial Portfolio

on:
  push:
    branches: [ main ]
    paths:
      - 'financial/**'
      - 'projects/financial_product_analysis.md'
      - 'images/**'
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "financial-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Pages
      uses: actions/configure-pages@v3
    
    - name: Create financial site structure
      run: |
        mkdir -p financial-site
        cp -r financial/* financial-site/
        cp -r projects financial-site/ 2>/dev/null || true
        cp -r images financial-site/ 2>/dev/null || true
        cp main.html financial-site/index.html 2>/dev/null || true
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: './financial-site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
