<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金融分析仪表板 - Financial Analytics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .dashboard-header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .dashboard-header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-header p {
            color: #7f8c8d;
            font-size: 1.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .stat-card h3 {
            color: #34495e;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .stat-card .change {
            font-size: 0.9em;
            font-weight: 500;
        }

        .positive {
            color: #27ae60;
        }

        .negative {
            color: #e74c3c;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .chart-card h3 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .chart-container {
            position: relative;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .full-width-chart {
            grid-column: 1 / -1;
        }

        .full-width-chart .chart-container {
            height: 400px;
        }

        .update-info {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9em;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.95);
            color: #2c3e50;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: #2c3e50;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .nav-btn.active {
            background: #2c3e50;
            color: white;
        }

        /* 内置图表样式 */
        .bar-chart {
            width: 100%;
            height: 100%;
        }

        .bar {
            fill: #4CAF50;
            transition: all 0.3s ease;
        }

        .bar:hover {
            fill: #45a049;
        }

        .pie-chart {
            width: 100%;
            height: 100%;
        }

        .line-chart {
            width: 100%;
            height: 100%;
        }

        .line {
            fill: none;
            stroke: #2196F3;
            stroke-width: 2;
        }

        .scatter-chart {
            width: 100%;
            height: 100%;
        }

        .dot {
            fill: #FF9800;
            transition: all 0.3s ease;
        }

        .dot:hover {
            fill: #F57C00;
            r: 8;
        }

        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9em;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .dashboard-header h1 {
                font-size: 2em;
            }
            
            .nav-buttons {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>📊 金融分析仪表板</h1>
            <p>实时金融数据分析与可视化 | Financial Analytics Dashboard</p>
        </div>

        <div class="nav-buttons">
            <a href="financial_product_analysis.html" class="nav-btn">📈 金融报告</a>
            <a href="https://xiaomiao027-sys.github.io/dashboard.html" class="nav-btn">🛒 电商仪表板</a>
            <a href="https://xiaomiao027-sys.github.io/main.html" class="nav-btn">🏠 主页</a>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>投资组合总值</h3>
                <div class="value" id="portfolio-value">¥2,456,789</div>
                <div class="change positive">+5.23% ↗</div>
            </div>
            <div class="stat-card">
                <h3>今日收益率</h3>
                <div class="value" id="daily-return">+2.34%</div>
                <div class="change positive">+¥12,345 ↗</div>
            </div>
            <div class="stat-card">
                <h3>股票数量</h3>
                <div class="value" id="stock-count">156</div>
                <div class="change positive">+12 新增 ↗</div>
            </div>
            <div class="stat-card">
                <h3>风险评级</h3>
                <div class="value" id="risk-level">中等</div>
                <div class="change">稳定 ↗</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>📈 投资组合表现</h3>
                <div class="chart-container">
                    <svg class="line-chart" id="portfolioChart"></svg>
                </div>
            </div>
            <div class="chart-card">
                <h3>🥧 资产配置分布</h3>
                <div class="chart-container">
                    <svg class="pie-chart" id="allocationChart"></svg>
                </div>
            </div>
            <div class="chart-card">
                <h3>📊 行业分析</h3>
                <div class="chart-container">
                    <svg class="bar-chart" id="sectorChart"></svg>
                </div>
            </div>
            <div class="chart-card">
                <h3>🔥 风险收益散点图</h3>
                <div class="chart-container">
                    <svg class="scatter-chart" id="riskReturnChart"></svg>
                </div>
            </div>
            <div class="chart-card full-width-chart">
                <h3>📅 市场趋势分析</h3>
                <div class="chart-container">
                    <svg class="line-chart" id="marketTrendChart"></svg>
                </div>
            </div>
        </div>

        <div class="update-info">
            <p>🔄 最后更新: <span id="last-update"></span> | 数据每5秒自动更新</p>
        </div>
    </div>

    <script>
        // 生成金融数据
        function generateFinancialData() {
            const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            
            // 投资组合数据
            const portfolioData = months.map(() => Math.floor(Math.random() * 500000) + 2000000);
            
            // 资产配置数据
            const allocationData = {
                labels: ['股票', '债券', '基金', '现金', '其他'],
                data: [35, 25, 20, 15, 5],
                colors: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF']
            };
            
            // 行业数据
            const sectorData = {
                labels: ['科技', '金融', '医疗', '消费', '能源', '工业'],
                returns: [12.5, 8.3, 15.2, 6.7, 9.8, 7.4],
                risks: [18.2, 12.1, 22.3, 8.9, 14.5, 11.2]
            };
            
            // 市场趋势数据
            const marketData = {
                labels: months,
                datasets: [
                    {
                        label: '上证指数',
                        data: months.map(() => Math.floor(Math.random() * 1000) + 3000),
                        color: '#FF6384'
                    },
                    {
                        label: '深证成指',
                        data: months.map(() => Math.floor(Math.random() * 1500) + 10000),
                        color: '#36A2EB'
                    },
                    {
                        label: '创业板指',
                        data: months.map(() => Math.floor(Math.random() * 800) + 2000),
                        color: '#4BC0C0'
                    }
                ]
            };
            
            return {
                months,
                portfolioData,
                allocationData,
                sectorData,
                marketData
            };
        }

        // 创建折线图
        function createLineChart(svgId, labels, datasets, width = 400, height = 300) {
            const svg = document.getElementById(svgId);
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            
            const padding = 40;
            const chartWidth = width - 2 * padding;
            const chartHeight = height - 2 * padding;
            
            let svgContent = '';
            
            // 绘制网格线
            for (let i = 0; i <= 5; i++) {
                const y = padding + (chartHeight / 5) * i;
                svgContent += `<line x1="${padding}" y1="${y}" x2="${width - padding}" y2="${y}" stroke="#e0e0e0" stroke-width="1"/>`;
            }
            
            // 绘制数据线
            datasets.forEach(dataset => {
                const maxValue = Math.max(...dataset.data);
                const minValue = Math.min(...dataset.data);
                const range = maxValue - minValue;
                
                let pathData = '';
                dataset.data.forEach((value, index) => {
                    const x = padding + (chartWidth / (dataset.data.length - 1)) * index;
                    const y = padding + chartHeight - ((value - minValue) / range) * chartHeight;
                    
                    if (index === 0) {
                        pathData += `M ${x} ${y}`;
                    } else {
                        pathData += ` L ${x} ${y}`;
                    }
                    
                    // 添加数据点
                    svgContent += `<circle cx="${x}" cy="${y}" r="3" fill="${dataset.color}"/>`;
                });
                
                svgContent += `<path d="${pathData}" class="line" stroke="${dataset.color}"/>`;
            });
            
            svg.innerHTML = svgContent;
        }

        // 创建饼图
        function createPieChart(svgId, labels, data, colors, width = 300, height = 300) {
            const svg = document.getElementById(svgId);
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) / 2 - 40;
            
            let svgContent = '';
            let currentAngle = -90; // 从顶部开始
            
            const total = data.reduce((sum, value) => sum + value, 0);
            
            data.forEach((value, index) => {
                const percentage = (value / total) * 100;
                const angle = (percentage / 100) * 360;
                
                const startAngle = currentAngle * Math.PI / 180;
                const endAngle = (currentAngle + angle) * Math.PI / 180;
                
                const x1 = centerX + radius * Math.cos(startAngle);
                const y1 = centerY + radius * Math.sin(startAngle);
                const x2 = centerX + radius * Math.cos(endAngle);
                const y2 = centerY + radius * Math.sin(endAngle);
                
                const largeArcFlag = angle > 180 ? 1 : 0;
                
                const pathData = [
                    `M ${centerX} ${centerY}`,
                    `L ${x1} ${y1}`,
                    `A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2}`,
                    'Z'
                ].join(' ');
                
                svgContent += `<path d="${pathData}" fill="${colors[index]}" stroke="white" stroke-width="2"/>`;
                
                // 添加标签
                const labelAngle = currentAngle + angle / 2;
                const labelRadius = radius * 0.7;
                const labelX = centerX + labelRadius * Math.cos(labelAngle * Math.PI / 180);
                const labelY = centerY + labelRadius * Math.sin(labelAngle * Math.PI / 180);
                
                svgContent += `<text x="${labelX}" y="${labelY}" text-anchor="middle" fill="white" font-size="12" font-weight="bold">${percentage.toFixed(1)}%</text>`;
                
                currentAngle += angle;
            });
            
            // 添加图例
            let legendY = 20;
            labels.forEach((label, index) => {
                svgContent += `<rect x="${width - 100}" y="${legendY}" width="12" height="12" fill="${colors[index]}"/>`;
                svgContent += `<text x="${width - 80}" y="${legendY + 10}" font-size="12" fill="#333">${label}</text>`;
                legendY += 20;
            });
            
            svg.innerHTML = svgContent;
        }

        // 创建柱状图
        function createBarChart(svgId, labels, datasets, width = 400, height = 300) {
            const svg = document.getElementById(svgId);
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            
            const padding = 40;
            const chartWidth = width - 2 * padding;
            const chartHeight = height - 2 * padding;
            
            let svgContent = '';
            
            const barWidth = chartWidth / (labels.length * datasets.length + labels.length);
            const groupWidth = barWidth * datasets.length;
            
            // 绘制网格线
            for (let i = 0; i <= 5; i++) {
                const y = padding + (chartHeight / 5) * i;
                svgContent += `<line x1="${padding}" y1="${y}" x2="${width - padding}" y2="${y}" stroke="#e0e0e0" stroke-width="1"/>`;
            }
            
            // 绘制柱状图
            labels.forEach((label, labelIndex) => {
                const groupX = padding + labelIndex * (groupWidth + barWidth) + barWidth;
                
                datasets.forEach((dataset, datasetIndex) => {
                    const value = dataset.data[labelIndex];
                    const maxValue = Math.max(...dataset.data);
                    const barHeight = (value / maxValue) * chartHeight;
                    const barX = groupX + datasetIndex * barWidth;
                    const barY = padding + chartHeight - barHeight;
                    
                    svgContent += `<rect x="${barX}" y="${barY}" width="${barWidth * 0.8}" height="${barHeight}" fill="${dataset.color}" class="bar"/>`;
                });
                
                // 添加标签
                const labelX = groupX + groupWidth / 2;
                svgContent += `<text x="${labelX}" y="${height - 10}" text-anchor="middle" font-size="10" fill="#666">${label}</text>`;
            });
            
            svg.innerHTML = svgContent;
        }

        // 创建散点图
        function createScatterChart(svgId, data, width = 400, height = 300) {
            const svg = document.getElementById(svgId);
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            
            const padding = 40;
            const chartWidth = width - 2 * padding;
            const chartHeight = height - 2 * padding;
            
            let svgContent = '';
            
            // 绘制网格线
            for (let i = 0; i <= 5; i++) {
                const y = padding + (chartHeight / 5) * i;
                const x = padding + (chartWidth / 5) * i;
                svgContent += `<line x1="${padding}" y1="${y}" x2="${width - padding}" y2="${y}" stroke="#e0e0e0" stroke-width="1"/>`;
                svgContent += `<line x1="${x}" y1="${padding}" x2="${x}" y2="${height - padding}" stroke="#e0e0e0" stroke-width="1"/>`;
            }
            
            // 绘制散点
            data.forEach(point => {
                const x = padding + (point.x / 30) * chartWidth; // 假设最大风险为30%
                const y = padding + chartHeight - (point.y / 20) * chartHeight; // 假设最大收益为20%
                
                svgContent += `<circle cx="${x}" cy="${y}" r="5" fill="#FF9800" class="dot"/>`;
                svgContent += `<text x="${x}" y="${y - 8}" text-anchor="middle" font-size="10" fill="#333">${point.label}</text>`;
            });
            
            svg.innerHTML = svgContent;
        }

        // 初始化图表
        function initCharts() {
            const data = generateFinancialData();
            
            // 投资组合表现图表
            createLineChart('portfolioChart', data.months, [
                {
                    label: '投资组合价值',
                    data: data.portfolioData,
                    color: '#4BC0C0'
                }
            ]);
            
            // 资产配置图表
            createPieChart('allocationChart', data.allocationData.labels, data.allocationData.data, data.allocationData.colors);
            
            // 行业分析图表
            createBarChart('sectorChart', data.sectorData.labels, [
                {
                    label: '收益率',
                    data: data.sectorData.returns,
                    color: '#4BC0C0'
                },
                {
                    label: '风险',
                    data: data.sectorData.risks,
                    color: '#FF6384'
                }
            ]);
            
            // 风险收益散点图
            const scatterData = data.sectorData.labels.map((label, i) => ({
                x: data.sectorData.risks[i],
                y: data.sectorData.returns[i],
                label: label
            }));
            createScatterChart('riskReturnChart', scatterData);
            
            // 市场趋势图表
            createLineChart('marketTrendChart', data.months, data.marketData.datasets, 600, 400);
        }

        // 更新统计数据
        function updateStats() {
            const portfolioValue = document.getElementById('portfolio-value');
            const dailyReturn = document.getElementById('daily-return');
            const stockCount = document.getElementById('stock-count');
            
            // 模拟数据变化
            const currentValue = parseInt(portfolioValue.textContent.replace(/[¥,]/g, ''));
            const newValue = currentValue + Math.floor(Math.random() * 10000) - 5000;
            portfolioValue.textContent = '¥' + newValue.toLocaleString();
            
            const returnChange = (Math.random() * 4 - 1).toFixed(2);
            dailyReturn.textContent = (returnChange > 0 ? '+' : '') + returnChange + '%';
            dailyReturn.className = returnChange > 0 ? 'change positive' : 'change negative';
            
            const newStockCount = parseInt(stockCount.textContent) + Math.floor(Math.random() * 5) - 2;
            stockCount.textContent = newStockCount;
        }

        // 更新时间
        function updateTime() {
            const now = new Date();
            document.getElementById('last-update').textContent = now.toLocaleString('zh-CN');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            updateTime();
            
            // 每5秒更新一次统计数据
            setInterval(updateStats, 5000);
            
            // 每分钟更新一次时间
            setInterval(updateTime, 60000);
        });
    </script>
</body>
</html>
